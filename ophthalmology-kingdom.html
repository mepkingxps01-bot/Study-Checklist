<!DOCTYPE html>

<title>Ophthalmology Kingdom</title>
<style>

:root{--gold:#c9a227;--dark-gold:#8b6914;--parchment:#f4e4c1;--dark-parchment:#e8d4a0;--dark-brown:#3a2010;--bg-dark:#1a1a2e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Text',serif;background:var(--bg-dark);color:var(--parchment);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,#16213e 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#0f3460 0%,transparent 50%),#1a1a2e;z-index:-2}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 30% 5%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 55% 20%,rgba(255,255,255,.9) 0%,transparent 100%),radial-gradient(1px 1px at 75% 8%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 45% 3%,rgba(255,255,255,.5) 0%,transparent 100%);z-index:-1;animation:twinkle 4s ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.7}to{opacity:1}}
header{text-align:center;padding:1.5rem 1rem 0.5rem;background:linear-gradient(180deg,rgba(0,0,0,.7) 0%,transparent 100%)}
header h1{font-family:'Cinzel',serif;font-size:clamp(1.6rem,4vw,3rem);color:var(--gold);text-shadow:0 0 20px rgba(201,162,39,.6),0 2px 4px rgba(0,0,0,.8);letter-spacing:.05em}
header .subtitle{font-style:italic;color:var(--dark-parchment);font-size:1rem;margin-top:.2rem;opacity:.9}
.overall-progress{max-width:500px;margin:.75rem auto .5rem;padding:0 1rem;text-align:center}
.overall-progress .label{font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold);margin-bottom:.3rem;letter-spacing:.08em}
.progress-bar-outer{height:12px;background:rgba(0,0,0,.5);border:1px solid var(--dark-gold);border-radius:6px;overflow:hidden}
.progress-bar-inner{height:100%;background:linear-gradient(90deg,var(--dark-gold),var(--gold),#ffd54f);border-radius:6px;transition:width .6s ease}
.header-controls{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-top:.6rem;padding-bottom:.75rem}
.btn{font-family:'Cinzel',serif;font-size:.75rem;padding:.45rem 1rem;border:2px solid var(--gold);background:rgba(201,162,39,.15);color:var(--gold);cursor:pointer;border-radius:4px;transition:all .2s;letter-spacing:.05em}
.btn:hover{background:rgba(201,162,39,.3);box-shadow:0 0 10px rgba(201,162,39,.4)}
.btn.active{background:var(--gold);color:var(--dark-brown)}
.btn-danger{border-color:#e57373;color:#e57373;background:rgba(229,115,115,.1)}
.btn-danger:hover{background:rgba(229,115,115,.25)}
.btn-reset{border-color:#e57373;color:#e57373;background:rgba(229,115,115,.1);font-size:.7rem}
.btn-reset:hover{background:rgba(229,115,115,.2)}
.map-frame{max-width:1100px;margin:0 auto 1.5rem;padding:0 .5rem;overflow-x:auto}
.map-frame svg{min-width:580px;display:block;width:100%}
.region-hover{fill:#c9a227;fill-opacity:0;transition:fill-opacity .2s;cursor:pointer}
.region-hover:hover{fill-opacity:.13}
@keyframes fog-drift{0%{transform:translateX(-4%)}50%{transform:translateX(4%)}100%{transform:translateX(-4%)}}
.fog-a{animation:fog-drift 9s ease-in-out infinite}
.fog-b{animation:fog-drift 13s ease-in-out infinite reverse}
@keyframes flag-wave{0%{transform:skewX(0deg)}50%{transform:skewX(-8deg)}100%{transform:skewX(0deg)}}
.flag{animation:flag-wave 2s ease-in-out infinite;transform-origin:left center}
@keyframes glow-pulse{0%{opacity:.25}50%{opacity:.7}100%{opacity:.25}}
.glow-aura{animation:glow-pulse 2.5s ease-in-out infinite}
@keyframes flicker{0%,100%{opacity:1}30%{opacity:.7}70%{opacity:.9}}
.torch{animation:flicker .9s ease-in-out infinite}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}
.panel-overlay.open{display:flex}
.panel{background:linear-gradient(180deg,#1e1408 0%,#150e05 100%);border:2px solid var(--dark-gold);border-radius:12px;width:100%;max-width:700px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(201,162,39,.2)}
.panel-header{padding:1rem 1.25rem;background:linear-gradient(90deg,rgba(201,162,39,.1),rgba(201,162,39,.05));border-bottom:1px solid var(--dark-gold);display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.panel-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);flex:1}
.panel-close{background:none;border:none;color:var(--gold);font-size:1.5rem;cursor:pointer;line-height:1;opacity:.7;transition:opacity .2s}
.panel-close:hover{opacity:1}
.panel-body{overflow-y:auto;padding:1rem 1.25rem;flex:1}
.panel-body::-webkit-scrollbar{width:6px}
.panel-body::-webkit-scrollbar-track{background:rgba(0,0,0,.3)}
.panel-body::-webkit-scrollbar-thumb{background:var(--dark-gold);border-radius:3px}
.tier-section{margin-bottom:1.5rem}
.tier-section-header{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);letter-spacing:.1em;padding:.4rem 0;border-bottom:1px solid rgba(201,162,39,.3);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.tier-count{font-size:.75rem;color:var(--dark-parchment);opacity:.7}
.topic-item{display:flex;align-items:center;gap:.6rem;padding:.45rem .5rem;border-radius:6px;transition:background .15s;cursor:pointer;user-select:none}
.topic-item:hover{background:rgba(201,162,39,.08)}
.topic-checkbox{width:20px;height:20px;flex-shrink:0;border:2px solid var(--dark-gold);border-radius:4px;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:12px;color:var(--bg-dark)}
.topic-item.checked .topic-checkbox{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px rgba(201,162,39,.5)}
.topic-label{font-size:.95rem;color:var(--parchment);flex:1;line-height:1.3}
.topic-item.checked .topic-label{text-decoration:line-through;opacity:.5}
.topic-stars{font-size:.75rem;flex-shrink:0}
.topic-plan-cb{width:18px;height:18px;flex-shrink:0;border:1.5px solid rgba(100,160,255,.35);border-radius:3px;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;font-size:11px;color:transparent;user-select:none}
.topic-plan-cb:hover{border-color:rgba(100,160,255,.7);background:rgba(100,160,255,.1)}
.topic-item.planned .topic-plan-cb{background:rgba(80,140,255,.22);border-color:#6fa3ef;color:#6fa3ef}
.topic-item.planned{background:rgba(80,130,255,.07);border-left:3px solid rgba(100,160,255,.45);padding-left:.3rem}
.topic-item.planned:hover{background:rgba(80,130,255,.12)}
.topic-edit-controls{display:none;gap:.3rem}
.edit-mode .topic-edit-controls{display:flex}
.edit-mode .topic-item{cursor:default}
.edit-mode .topic-item:hover{background:rgba(201,162,39,.04)}
.topic-edit-btn{background:none;border:1px solid rgba(201,162,39,.3);color:var(--gold);border-radius:3px;width:22px;height:22px;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;padding:0}
.topic-edit-btn:hover{background:rgba(201,162,39,.2)}
.topic-edit-btn.del{border-color:rgba(229,115,115,.4);color:#e57373}
.topic-edit-btn.del:hover{background:rgba(229,115,115,.15)}
.topic-edit-form{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;padding:.5rem;background:rgba(201,162,39,.05);border-radius:6px;border:1px solid rgba(201,162,39,.2);margin:.2rem 0}
.topic-edit-form input[type=text]{flex:1;min-width:120px;background:rgba(0,0,0,.4);border:1px solid var(--dark-gold);border-radius:4px;color:var(--parchment);padding:.3rem .6rem;font-family:'Crimson Text',serif;font-size:.9rem}
.topic-edit-form select,.add-topic-form select{background:rgba(0,0,0,.4);border:1px solid var(--dark-gold);border-radius:4px;color:var(--parchment);padding:.3rem .5rem;font-family:'Cinzel',serif;font-size:.75rem;cursor:pointer}
.topic-edit-form select option,.add-topic-form select option{background:#1e1408}
.add-topic-section{border-top:1px solid rgba(201,162,39,.2);padding-top:1rem;margin-top:.5rem;display:none}
.edit-mode .add-topic-section{display:block}
.add-topic-section h4{font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold);letter-spacing:.08em;margin-bottom:.6rem}
.add-topic-form{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.add-topic-form input[type=text]{flex:1;min-width:150px;background:rgba(0,0,0,.4);border:1px solid var(--dark-gold);border-radius:4px;color:var(--parchment);padding:.4rem .7rem;font-family:'Crimson Text',serif;font-size:.95rem}
input[type=text]:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 6px rgba(201,162,39,.3)}
.notification{position:fixed;top:1rem;right:1rem;background:linear-gradient(135deg,#1e1408,#2a1c0a);border:2px solid var(--gold);border-radius:8px;padding:.75rem 1.25rem;font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);z-index:999;box-shadow:0 0 20px rgba(201,162,39,.4);transform:translateX(200%);transition:transform .4s ease;max-width:280px}
.notification.show{transform:translateX(0)}
@media(max-width:600px){header h1{font-size:1.4rem}.panel{max-height:95vh}}
</style>
</head>

// ── STATE ─────────────────────────────────────────────────────
let state = {checked:{}, planned:{}, topics:{}};
let editMode = false, currentDistrict = null, editingTopicId = null;

function loadState(){
  try { const s=localStorage.getItem('ophthoKingdom'); if(s) state=JSON.parse(s); } catch(e){}
  if(!state.planned) state.planned={};
  DISTRICTS_DEF.forEach(d=>{ if(!state.topics[d.id]) state.topics[d.id]=d.topics.map(t=>({...t})); });
}
function saveState(){ localStorage.setItem('ophthoKingdom', JSON.stringify(state)); }
function getTopics(id){ return state.topics[id]||[]; }
function calcProgress(id){
  const must=getTopics(id).filter(t=>t.tier===3);
  if(!must.length) return 0;
  return Math.round(must.filter(t=>state.checked[t.id]).length/must.length*100);
}
function calcOverall(){
  const u=DISTRICTS_DEF.filter(d=>!d.locked);
  return u.length ? Math.round(u.reduce((a,d)=>a+calcProgress(d.id),0)/u.length) : 0;
}
function getTier(p){ return p>=100?100:p>=75?75:p>=50?50:p>=25?25:0; }
function getTierLabel(t){ return {0:'Barren Wasteland',25:'Humble Settlement',50:'Growing Town',75:'Castle District',100:'Grand Kingdom'}[t]||'Barren'; }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderMap(){

  document.getElementById('overall-pct').textContent = overall+'%';
  document.getElementById('overall-bar').style.width = overall+'%';

  let svg = `<svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:580px">
<defs>
  ${REGIONS.map(r=>`<clipPath id="cp-${r.id}"><polygon points="${r.pts}"/></clipPath>`).join('')}
  <filter id="gf"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<!-- Ocean -->
<rect width="1000" height="660" fill="#0c1520"/>
<line x1="0" y1="30" x2="1000" y2="30" stroke="rgba(100,150,200,.04)" stroke-width="1"/>
<line x1="0" y1="80" x2="1000" y2="80" stroke="rgba(100,150,200,.03)" stroke-width="1"/>

<line x1="0" y1="630" x2="1000" y2="630" stroke="rgba(100,150,200,.04)" stroke-width="1"/>`;

  // ── Render each territory ──
  REGIONS.forEach(r=>{
    const d   = DISTRICTS_DEF.find(x=>x.id===r.id);
    const lck = d.locked;
    const pct = lck ? 0 : calcProgress(r.id);
    const tr  = getTier(pct);
    const sc  = r.sm ? 0.62 : (r.id==='cornea' ? 1.05 : 0.78);

    // Terrain fill
    svg += `<g clip-path="url(#cp-${r.id})">`;
    svg += `<polygon points="${r.pts}" fill="${lck ? '#364858' : terrainColor(tr)}"/>`;

    if(lck){
      // Fog
      svg += `<polygon points="${r.pts}" fill="rgba(70,100,130,.52)"/>`;
      svg += `<rect class="fog-a" x="-80" y="${r.cy-55}" width="1160" height="75" rx="37" fill="rgba(155,180,210,.13)"/>`;
      svg += `<rect class="fog-b" x="-80" y="${r.cy-10}" width="1160" height="55" rx="27" fill="rgba(140,168,200,.1)"/>`;
    } else {
      // Terrain scatter + buildings
      if(tr===0){
        svg += `<ellipse cx="${r.cx-35}" cy="${r.cy+18}" rx="14" ry="6" fill="#160c04" opacity=".7"/>`;
        svg += `<ellipse cx="${r.cx+30}" cy="${r.cy+22}" rx="10" ry="5" fill="#160c04" opacity=".6"/>`;
      }
      if(tr>=25 && tr<100){
        svg += `<ellipse cx="${r.cx-45}" cy="${r.cy+20}" rx="18" ry="8" fill="#1a1208" opacity=".5"/>`;
        svg += `<circle cx="${r.cx+42}" cy="${r.cy+18}" r="12" fill="#1e2a12" opacity=".4"/>`;

      }
      svg += miniIcon(r.cx, r.cy-18, tr, sc);
    }
    svg += `</g>`;

    // Border
    const bc = lck ? '#1e2d3a' : (tr===100 ? '#ffd54f' : '#6a4a10');
    const bw = lck ? 1 : (tr===100 ? 2.5 : 1.5);
    svg += `<polygon points="${r.pts}" fill="none" stroke="${bc}" stroke-width="${bw}" opacity="${lck?0.55:0.9}"/>`;

    // Click overlay
    if(!lck) svg += `<polygon points="${r.pts}" class="region-hover" onclick="openPanel('${r.id}')"/>`;

    // Labels
    const fs  = r.sm ? 10 : 12;
    const lby = r.cy + (lck ? 28 : 26);
    const tc  = lck ? 'rgba(160,190,215,.55)' : '#c9a227';
    svg += `<text x="${r.cx}" y="${lby}" text-anchor="middle" font-family="Cinzel,serif" font-size="${fs}" fill="${tc}" font-weight="700" pointer-events="none">${d.name}</text>`;

    if(!lck){
      svg += `<text x="${r.cx}" y="${lby+fs+2}" text-anchor="middle" font-family="Crimson Text,serif" font-size="${fs-1}" fill="rgba(228,212,160,.65)" font-style="italic" pointer-events="none">${d.subtitle}</text>`;
      const bw2 = r.sm ? 44 : 64;
      const bx = r.cx - bw2/2;
      const by = lby + fs + (fs-1) + 5;
      svg += `<rect x="${bx}" y="${by}" width="${bw2}" height="4" rx="2" fill="rgba(0,0,0,.55)" pointer-events="none"/>`;
      svg += `<rect x="${bx}" y="${by}" width="${bw2*pct/100}" height="4" rx="2" fill="#c9a227" pointer-events="none"/>`;
      svg += `<text x="${r.cx}" y="${by+15}" text-anchor="middle" font-family="Cinzel,serif" font-size="9" fill="rgba(201,162,39,.8)" pointer-events="none">${pct}%</text>`;
    } else {
      svg += `<text x="${r.cx}" y="${lby+fs+6}" text-anchor="middle" font-size="15" fill="rgba(150,180,210,.38)" pointer-events="none">&#128274;</text>`;
    }
  });

  // Compass rose
  const cx=950, cy=625;
  svg += `
<circle cx="${cx}" cy="${cy}" r="22" fill="rgba(0,0,0,.45)" stroke="rgba(201,162,39,.28)" stroke-width="1"/>
<polygon points="${cx},${cy-18} ${cx-5},${cy-5} ${cx},${cy-9} ${cx+5},${cy-5}" fill="#c9a227" opacity=".85"/>
<polygon points="${cx},${cy+18} ${cx-5},${cy+5} ${cx},${cy+9} ${cx+5},${cy+5}" fill="rgba(201,162,39,.38)"/>
<polygon points="${cx-18},${cy} ${cx-5},${cy-5} ${cx-9},${cy} ${cx-5},${cy+5}" fill="rgba(201,162,39,.38)"/>
<polygon points="${cx+18},${cy} ${cx+5},${cy-5} ${cx+9},${cy} ${cx+5},${cy+5}" fill="rgba(201,162,39,.38)"/>
<text x="${cx}" y="${cy-21}" text-anchor="middle" font-family="Cinzel,serif" font-size="8" fill="rgba(201,162,39,.7)">N</text>`;

  svg += `</svg>`;
  document.getElementById('map-container').innerHTML = svg;
}

// ── PANEL ─────────────────────────────────────────────────────
function openPanel(id){
  const d=DISTRICTS_DEF.find(x=>x.id===id);
  if(!d||d.locked) return;
  currentDistrict=id; editingTopicId=null;
  document.getElementById('panel-title').textContent=d.name+' — '+d.subtitle;
  renderPanel();
  document.getElementById('panel-overlay').classList.add('open');
}
function closePanel(){
  document.getElementById('panel-overlay').classList.remove('open');
  currentDistrict=null; editingTopicId=null;
}
function closePanelOnOverlay(e){ if(e.target===document.getElementById('panel-overlay')) closePanel(); }

function renderPanel(){
  if(!currentDistrict) return;
  const topics=getTopics(currentDistrict), pct=calcProgress(currentDistrict);
  const body=document.getElementById('panel-body'), isEdit=editMode;
  let html=`<div class="${isEdit?'edit-mode':''}">
<div style="margin-bottom:1rem">
  <div style="font-family:'Cinzel',serif;font-size:.75rem;color:var(--gold);margin-bottom:.3rem;letter-spacing:.08em">DISTRICT PROGRESS: ${pct}% &mdash; ${getTierLabel(getTier(pct))}</div>
  <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%"></div></div>
</div>`;

  [3,2,1].forEach(tier=>{
    const tt=topics.filter(t=>t.tier===tier); if(!tt.length) return;
    const done=tt.filter(t=>state.checked[t.id]).length;
    html+=`<div class="tier-section"><div class="tier-section-header">${TIER_LABELS[tier]}<span class="tier-count">${done}/${tt.length}</span></div>`;
    tt.forEach(topic=>{
      if(editingTopicId===topic.id){
        html+=`<div class="topic-edit-form"><input type="text" id="ei-${topic.id}" value="${escHtml(topic.label)}" style="flex:1" onkeydown="handleEditKey(event,'${topic.id}')"/><select id="et-${topic.id}"><option value="3"${topic.tier===3?' selected':''}>⭐⭐⭐ Must</option><option value="2"${topic.tier===2?' selected':''}>⭐⭐ Good</option><option value="1"${topic.tier===1?' selected':''}>⭐ Low</option></select><button class="btn" style="padding:.3rem .7rem;font-size:.75rem" onclick="saveTopicEdit('${topic.id}')">Save</button><button class="btn btn-danger" style="padding:.3rem .7rem;font-size:.75rem" onclick="cancelTopicEdit()">Cancel</button></div>`;
      } else {
        const chk=!!state.checked[topic.id], pln=!!state.planned[topic.id];
        html+=`<div class="topic-item${chk?' checked':''}${pln?' planned':''}" onclick="${isEdit?'':'toggleTopic(\''+topic.id+'\')'}" ><div class="topic-checkbox">${chk?'✓':''}</div><div class="topic-label">${escHtml(topic.label)}</div><div class="topic-plan-cb" title="Mark as planned" onclick="event.stopPropagation();togglePlanned('${topic.id}')">${pln?'▶':''}</div><div class="topic-stars">${TIER_STARS[topic.tier]}</div><div class="topic-edit-controls"><button class="topic-edit-btn" onclick="event.stopPropagation();startEditTopic('${topic.id}')">✎</button><button class="topic-edit-btn del" onclick="event.stopPropagation();deleteTopic('${topic.id}')">✕</button></div></div>`;
      }
    });
    html+=`</div>`;
  });

  html+=`<div class="add-topic-section"><h4>+ Add New Topic</h4><div class="add-topic-form"><input type="text" id="new-topic-input" placeholder="Topic name…" onkeydown="if(event.key==='Enter')addTopic()"/><select id="new-topic-tier"><option value="3">⭐⭐⭐ Must Know</option><option value="2">⭐⭐ Good to Know</option><option value="1">⭐ Low Yield</option></select><button class="btn" onclick="addTopic()">Add</button></div></div></div>`;
  body.innerHTML=html;
}

// ── TOPIC ACTIONS ─────────────────────────────────────────────
function toggleTopic(id){
  if(editMode) return;
  state.checked[id]=!state.checked[id]; saveState(); renderPanel(); renderMap();
  if(state.checked[id]&&currentDistrict){
    const pct=calcProgress(currentDistrict), tier=getTier(pct);
    if([25,50,75,100].includes(tier)&&getTier(pct-1)<tier) showNotification('🏰 '+getTierLabel(tier)+' reached!');
  }
}
function togglePlanned(id){
  state.planned[id]=!state.planned[id]; saveState(); renderPanel();
}
function startEditTopic(id){ editingTopicId=id; renderPanel(); setTimeout(()=>{const el=document.getElementById('ei-'+id);if(el){el.focus();el.select();}},50); }
function handleEditKey(e,id){ if(e.key==='Enter') saveTopicEdit(id); if(e.key==='Escape') cancelTopicEdit(); }
function saveTopicEdit(id){
  const inp=document.getElementById('ei-'+id), ts=document.getElementById('et-'+id);
  if(!inp) return; const nl=inp.value.trim(); if(!nl) return;
  const t=state.topics[currentDistrict].find(x=>x.id===id);
  if(t){t.label=nl;t.tier=parseInt(ts.value);}
  editingTopicId=null; saveState(); renderPanel(); renderMap();
}
function cancelTopicEdit(){ editingTopicId=null; renderPanel(); }
function deleteTopic(id){
  if(!confirm('Remove this topic?')) return;
  state.topics[currentDistrict]=state.topics[currentDistrict].filter(t=>t.id!==id);
  delete state.checked[id]; saveState(); renderPanel(); renderMap();
}
function addTopic(){
  const inp=document.getElementById('new-topic-input'), ts=document.getElementById('new-topic-tier');
  const label=inp.value.trim(); if(!label) return;
  state.topics[currentDistrict].push({id:currentDistrict+'_'+Date.now(),label,tier:parseInt(ts.value)});
  saveState(); inp.value=''; renderPanel(); renderMap(); showNotification('Topic added!');
}

// ── EDIT MODE / RESET ─────────────────────────────────────────
function toggleEditMode(){
  editMode=!editMode;
  const btn=document.getElementById('edit-mode-btn');
  btn.textContent=editMode?'✎ Exit Edit Mode':'✎ Edit Mode';
  btn.classList.toggle('active',editMode);
  if(currentDistrict) renderPanel();
}
function confirmReset(){
  if(!confirm('Reset ALL progress? This cannot be undone.')) return;
  state.checked={}; saveState(); renderMap();
  if(currentDistrict) renderPanel();
  showNotification('Kingdom reset. Begin anew, scholar.');
}

// ── NOTIFICATION ──────────────────────────────────────────────
let notifTimer=null;
function showNotification(msg){
  const el=document.getElementById('notification');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(notifTimer); notifTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

loadState();
renderMap();
</script>
</body>
</html>
