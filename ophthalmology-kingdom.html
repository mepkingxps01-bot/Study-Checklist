<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ophthalmology Kingdom</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
  :root{--gold:#c9a227;--dark-gold:#8b6914;--parchment:#f4e4c1;--dark-parchment:#e8d4a0;--brown:#5c3d1e;--dark-brown:#3a2010;--glow-gold:#ffd54f;--bg-dark:#1a1a2e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Crimson Text',serif;background:var(--bg-dark);color:var(--parchment);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,#16213e 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#0f3460 0%,transparent 50%),#1a1a2e;z-index:-2}
  body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,0.8) 0%,transparent 100%),radial-gradient(1px 1px at 30% 5%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(1px 1px at 55% 20%,rgba(255,255,255,0.9) 0%,transparent 100%),radial-gradient(1px 1px at 75% 8%,rgba(255,255,255,0.7) 0%,transparent 100%),radial-gradient(1px 1px at 90% 18%,rgba(255,255,255,0.8) 0%,transparent 100%);z-index:-1;animation:twinkle 4s ease-in-out infinite alternate}
  @keyframes twinkle{from{opacity:.7}to{opacity:1}}
  header{text-align:center;padding:2rem 1rem 1rem;background:linear-gradient(180deg,rgba(0,0,0,.7) 0%,transparent 100%)}
  header h1{font-family:'Cinzel',serif;font-size:clamp(1.8rem,5vw,3.5rem);color:var(--gold);text-shadow:0 0 20px rgba(201,162,39,.6),0 2px 4px rgba(0,0,0,.8);letter-spacing:.05em}
  header .subtitle{font-style:italic;color:var(--dark-parchment);font-size:1.1rem;margin-top:.3rem;opacity:.9}
  .header-controls{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-top:1rem}
  .btn{font-family:'Cinzel',serif;font-size:.8rem;padding:.5rem 1.2rem;border:2px solid var(--gold);background:rgba(201,162,39,.15);color:var(--gold);cursor:pointer;border-radius:4px;transition:all .2s;letter-spacing:.05em}
  .btn:hover{background:rgba(201,162,39,.3);box-shadow:0 0 10px rgba(201,162,39,.4)}
  .btn.active{background:var(--gold);color:var(--dark-brown)}
  .btn-danger{border-color:#e57373;color:#e57373;background:rgba(229,115,115,.1)}
  .btn-danger:hover{background:rgba(229,115,115,.25)}
  .btn-reset{border-color:#e57373;color:#e57373;background:rgba(229,115,115,.1);font-size:.7rem}
  .btn-reset:hover{background:rgba(229,115,115,.2)}
  .overall-progress{max-width:600px;margin:0 auto 1.5rem;padding:0 1rem;text-align:center}
  .overall-progress .label{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);margin-bottom:.4rem;letter-spacing:.08em}
  .progress-bar-outer{height:14px;background:rgba(0,0,0,.5);border:1px solid var(--dark-gold);border-radius:7px;overflow:hidden}
  .progress-bar-inner{height:100%;background:linear-gradient(90deg,var(--dark-gold),var(--gold),#ffd54f);border-radius:7px;transition:width .6s ease;position:relative}
  .progress-bar-inner::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.3) 0%,transparent 60%);border-radius:7px}
  .kingdom-map{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;max-width:1200px;margin:0 auto 2rem;padding:0 1rem}
  .district-card{border-radius:12px;overflow:hidden;border:2px solid transparent;position:relative;transition:transform .2s,box-shadow .3s;cursor:pointer}
  .district-card:hover{transform:translateY(-3px)}
  .district-card.unlocked{border-color:var(--dark-gold);box-shadow:0 4px 20px rgba(0,0,0,.5)}
  .district-card.unlocked:hover{box-shadow:0 8px 30px rgba(201,162,39,.3)}
  .district-card[data-tier="100"]{border-color:var(--glow-gold);animation:grand-glow 2s ease-in-out infinite alternate}
  @keyframes grand-glow{from{box-shadow:0 0 20px rgba(255,213,79,.3),0 4px 20px rgba(0,0,0,.5)}to{box-shadow:0 0 50px rgba(255,213,79,.6),0 4px 20px rgba(0,0,0,.5)}}
  .district-card.locked{border-color:#334;opacity:.7;cursor:default}
  .district-card.locked:hover{transform:none}
  .district-visual{height:160px;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center}
  .district-scene{width:100%;height:100%;position:absolute;inset:0}
  .fog-overlay{position:absolute;inset:0;background:linear-gradient(135deg,#8899aa 0%,#aabbcc 50%,#778899 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem}
  .fog-text{font-family:'Cinzel',serif;font-size:.9rem;color:rgba(255,255,255,.5);letter-spacing:.1em}
  .lock-icon{font-size:2rem;opacity:.4}
  .district-info{padding:.8rem 1rem;background:linear-gradient(180deg,rgba(20,15,10,.95) 0%,rgba(30,20,10,.98) 100%)}
  .district-name{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);font-weight:700;letter-spacing:.05em}
  .district-subtitle{font-style:italic;font-size:.85rem;color:var(--dark-parchment);opacity:.8}
  .district-progress-row{display:flex;align-items:center;gap:.5rem;margin-top:.5rem}
  .district-progress-bar{flex:1;height:8px;background:rgba(0,0,0,.5);border:1px solid var(--dark-gold);border-radius:4px;overflow:hidden}
  .district-progress-fill{height:100%;background:linear-gradient(90deg,var(--dark-gold),var(--gold));border-radius:4px;transition:width .5s ease}
  .district-progress-pct{font-family:'Cinzel',serif;font-size:.75rem;color:var(--gold);min-width:36px;text-align:right}
  .district-tier-badge{font-size:.7rem;padding:.1rem .5rem;border-radius:3px;border:1px solid;font-family:'Cinzel',serif;letter-spacing:.05em}
  .tier-0{border-color:#556;color:#889;background:rgba(85,85,102,.2)}
  .tier-25{border-color:#8b6914;color:#c9a227;background:rgba(139,105,20,.2)}
  .tier-50{border-color:#7a7a7a;color:#aaa;background:rgba(122,122,122,.2)}
  .tier-75{border-color:#5588bb;color:#88aadd;background:rgba(85,136,187,.2)}
  .tier-100{border-color:#ffd54f;color:#ffd54f;background:rgba(255,213,79,.15)}
  .panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}
  .panel-overlay.open{display:flex}
  .panel{background:linear-gradient(180deg,#1e1408 0%,#150e05 100%);border:2px solid var(--dark-gold);border-radius:12px;width:100%;max-width:700px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(201,162,39,.2)}
  .panel-header{padding:1rem 1.25rem;background:linear-gradient(90deg,rgba(201,162,39,.1) 0%,rgba(201,162,39,.05) 100%);border-bottom:1px solid var(--dark-gold);display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
  .panel-title{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--gold);flex:1}
  .panel-close{background:none;border:none;color:var(--gold);font-size:1.5rem;cursor:pointer;line-height:1;opacity:.7;transition:opacity .2s}
  .panel-close:hover{opacity:1}
  .panel-body{overflow-y:auto;padding:1rem 1.25rem;flex:1}
  .panel-body::-webkit-scrollbar{width:6px}
  .panel-body::-webkit-scrollbar-track{background:rgba(0,0,0,.3)}
  .panel-body::-webkit-scrollbar-thumb{background:var(--dark-gold);border-radius:3px}
  .tier-section{margin-bottom:1.5rem}
  .tier-section-header{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);letter-spacing:.1em;padding:.4rem 0;border-bottom:1px solid rgba(201,162,39,.3);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
  .tier-count{font-size:.75rem;color:var(--dark-parchment);opacity:.7}
  .topic-item{display:flex;align-items:center;gap:.6rem;padding:.45rem .5rem;border-radius:6px;transition:background .15s;cursor:pointer;user-select:none}
  .topic-item:hover{background:rgba(201,162,39,.08)}
  .topic-checkbox{width:20px;height:20px;flex-shrink:0;border:2px solid var(--dark-gold);border-radius:4px;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:12px;color:var(--bg-dark)}
  .topic-item.checked .topic-checkbox{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px rgba(201,162,39,.5)}
  .topic-label{font-size:.95rem;color:var(--parchment);flex:1;line-height:1.3}
  .topic-item.checked .topic-label{text-decoration:line-through;opacity:.5}
  .topic-stars{font-size:.75rem;flex-shrink:0}
  .topic-edit-controls{display:none;gap:.3rem}
  .edit-mode .topic-edit-controls{display:flex}
  .edit-mode .topic-item{cursor:default}
  .edit-mode .topic-item:hover{background:rgba(201,162,39,.04)}
  .topic-edit-btn{background:none;border:1px solid rgba(201,162,39,.3);color:var(--gold);border-radius:3px;width:22px;height:22px;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;padding:0}
  .topic-edit-btn:hover{background:rgba(201,162,39,.2)}
  .topic-edit-btn.del{border-color:rgba(229,115,115,.4);color:#e57373}
  .topic-edit-btn.del:hover{background:rgba(229,115,115,.15)}
  .topic-edit-form{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;padding:.5rem;background:rgba(201,162,39,.05);border-radius:6px;border:1px solid rgba(201,162,39,.2);margin:.2rem 0}
  .topic-edit-form input[type=text]{flex:1;min-width:120px;background:rgba(0,0,0,.4);border:1px solid var(--dark-gold);border-radius:4px;color:var(--parchment);padding:.3rem .6rem;font-family:'Crimson Text',serif;font-size:.9rem}
  .topic-edit-form select{background:rgba(0,0,0,.4);border:1px solid var(--dark-gold);border-radius:4px;color:var(--parchment);padding:.3rem .5rem;font-family:'Cinzel',serif;font-size:.75rem;cursor:pointer}
  .topic-edit-form select option{background:#1e1408}
  .add-topic-section{border-top:1px solid rgba(201,162,39,.2);padding-top:1rem;margin-top:.5rem;display:none}
  .edit-mode .add-topic-section{display:block}
  .add-topic-section h4{font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold);letter-spacing:.08em;margin-bottom:.6rem}
  .add-topic-form{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
  .add-topic-form input[type=text]{flex:1;min-width:150px;background:rgba(0,0,0,.4);border:1px solid var(--dark-gold);border-radius:4px;color:var(--parchment);padding:.4rem .7rem;font-family:'Crimson Text',serif;font-size:.95rem}
  .add-topic-form select{background:rgba(0,0,0,.4);border:1px solid var(--dark-gold);border-radius:4px;color:var(--parchment);padding:.4rem .5rem;font-family:'Cinzel',serif;font-size:.75rem;cursor:pointer}
  .add-topic-form select option{background:#1e1408}
  input[type=text]:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 6px rgba(201,162,39,.3)}
  @keyframes fog-drift{0%{transform:translateX(-5%)}50%{transform:translateX(5%)}100%{transform:translateX(-5%)}}
  .fog-layer{animation:fog-drift 8s ease-in-out infinite}
  .fog-layer2{animation:fog-drift 12s ease-in-out infinite reverse}
  @keyframes flag-wave{0%{transform:skewX(0deg)}50%{transform:skewX(-8deg)}100%{transform:skewX(0deg)}}
  .flag{animation:flag-wave 2s ease-in-out infinite;transform-origin:left center}
  @keyframes glow-pulse{0%{opacity:.3}50%{opacity:.8}100%{opacity:.3}}
  .glow-aura{animation:glow-pulse 2s ease-in-out infinite}
  @keyframes flicker{0%,100%{opacity:1;transform:scaleY(1)}25%{opacity:.8;transform:scaleY(.9) scaleX(1.1)}75%{opacity:.9;transform:scaleY(1.1) scaleX(.9)}}
  .torch-flame{animation:flicker .8s ease-in-out infinite;transform-origin:bottom center}
  .notification{position:fixed;top:1rem;right:1rem;background:linear-gradient(135deg,#1e1408,#2a1c0a);border:2px solid var(--gold);border-radius:8px;padding:.75rem 1.25rem;font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);z-index:999;box-shadow:0 0 20px rgba(201,162,39,.4);transform:translateX(200%);transition:transform .4s ease;max-width:280px}
  .notification.show{transform:translateX(0)}
  @media(max-width:480px){.kingdom-map{grid-template-columns:1fr}.panel{max-height:95vh}header h1{font-size:1.6rem}}
</style>
</head>
<body>
<header>
  <h1>&#9877; Ophthalmology Kingdom &#9877;</h1>
  <div class="subtitle">Study the arcane arts &mdash; build your realm</div>
  <div class="overall-progress">
    <div class="label">KINGDOM POWER: <span id="overall-pct">0%</span></div>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="overall-bar" style="width:0%"></div></div>
  </div>
  <div class="header-controls">
    <button class="btn" id="edit-mode-btn" onclick="toggleEditMode()">&#10002; Edit Mode</button>
    <button class="btn btn-reset" onclick="confirmReset()">&#8634; Reset All</button>
  </div>
</header>
<div class="kingdom-map" id="kingdom-map"></div>
<div class="panel-overlay" id="panel-overlay" onclick="closePanelOnOverlay(event)">
  <div class="panel">
    <div class="panel-header"><div class="panel-title" id="panel-title">Cornea District</div><button class="panel-close" onclick="closePanel()">&times;</button></div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>
<div class="notification" id="notification"></div>
<script>
const DISTRICTS_DEF=[{id:'cornea',name:'Cornea',subtitle:'The Crystal Citadel',locked:false,topics:[{id:'c1',label:'Corneal layers (Epithelium, Bowman, Stroma, Descemet, Endothelium)',tier:3},{id:'c2',label:'Tear film layers',tier:3},{id:'c3',label:'Limbus & stem cells',tier:3},{id:'c4',label:'Slit lamp techniques',tier:3},{id:'c5',label:'Corneal topography vs tomography',tier:3},{id:'c6',label:'AS-OCT interpretation',tier:3},{id:'c7',label:'Specular microscopy & pachymetry',tier:3},{id:'c8',label:'Aqueous deficiency vs evaporative dry eye',tier:3},{id:'c9',label:'Meibomian gland dysfunction',tier:3},{id:'c10',label:'Dry eye treatment options',tier:3},{id:'c11',label:'Epithelial dystrophies (EBMD)',tier:3},{id:'c12',label:'Stromal dystrophies (Granular, Lattice, Macular)',tier:3},{id:'c13',label:'Fuchs endothelial dystrophy',tier:3},{id:'c14',label:'Keratoconus diagnosis & staging',tier:3},{id:'c15',label:'Keratoconus management & crosslinking',tier:3},{id:'c16',label:'Pellucid marginal degeneration',tier:3},{id:'c17',label:'HSV keratitis',tier:3},{id:'c18',label:'HZV keratitis',tier:3},{id:'c19',label:'Adenovirus keratitis',tier:3},{id:'c20',label:'Bacterial keratitis',tier:3},{id:'c21',label:'Fungal keratitis',tier:3},{id:'c22',label:'Acanthamoeba keratitis',tier:3},{id:'c23',label:'Vernal keratoconjunctivitis',tier:3},{id:'c24',label:'Stevens-Johnson syndrome',tier:3},{id:'c25',label:'Mucous membrane pemphigoid',tier:3},{id:'c26',label:'Peripheral ulcerative keratitis',tier:3},{id:'c27',label:'Scleritis & episcleritis',tier:3},{id:'c28',label:'Mooren ulcer',tier:3},{id:'c29',label:'OSSN',tier:3},{id:'c30',label:'Conjunctival melanoma & PAM',tier:3},{id:'c31',label:'PKP indications & complications',tier:3},{id:'c32',label:'DALK',tier:3},{id:'c33',label:'DSAEK vs DMEK',tier:3},{id:'c34',label:'Keratoprosthesis basics',tier:3},{id:'c35',label:'Neurotrophic keratopathy',tier:2},{id:'c36',label:'Recurrent corneal erosion',tier:2},{id:'c37',label:'Limbal stem cell deficiency',tier:2},{id:'c38',label:'Exposure keratopathy',tier:2},{id:'c39',label:'Amniotic membrane graft',tier:2},{id:'c40',label:'Pterygium excision',tier:2},{id:'c41',label:'Limbal stem cell transplantation',tier:2},{id:'c42',label:'Tarsorrhaphy',tier:2},{id:'c43',label:'Pterygium vs pinguecula',tier:2},{id:'c44',label:'Band keratopathy',tier:2},{id:'c45',label:'Salzmann nodular degeneration',tier:2},{id:'c46',label:'Arcus senilis',tier:2},{id:'c47',label:'Peters anomaly',tier:2},{id:'c48',label:'Sclerocornea',tier:2},{id:'c49',label:'Limbal dermoid',tier:2},{id:'c50',label:'Anterior segment dysgenesis',tier:2},{id:'c51',label:'Wilson disease (KF ring)',tier:2},{id:'c52',label:'Cystinosis',tier:2},{id:'c53',label:'Marfan syndrome cornea',tier:2},{id:'c54',label:'Vitamin A deficiency',tier:2},{id:'c55',label:'Chemical burns (alkali vs acid)',tier:2},{id:'c56',label:'Traumatic hyphema',tier:2},{id:'c57',label:'Corneal foreign body',tier:2},{id:'c58',label:'Penetrating trauma management',tier:2},{id:'c59',label:'Specific dry eye scoring systems',tier:1},{id:'c60',label:'Rare metabolic disorders (Mucolipidoses, Oligosaccharidoses)',tier:1},{id:'c61',label:'Loiasis',tier:1},{id:'c62',label:'Parinaud oculoglandular syndrome',tier:1},{id:'c63',label:'Oncocytoma',tier:1},{id:'c64',label:'Rare mesenchymal tumors',tier:1},{id:'c65',label:'Metastatic conjunctival tumors',tier:1}]},{id:'retina',name:'Retina',subtitle:'Crystal Tower',locked:true,topics:[]},{id:'glaucoma',name:'Glaucoma',subtitle:'Stone Fortress',locked:true,topics:[]},{id:'neuro',name:'Neuro-ophthalmology',subtitle:"Wizard's Library",locked:true,topics:[]},{id:'uveitis',name:'Uveitis',subtitle:'Alchemist Quarter',locked:true,topics:[]},{id:'pediatric',name:'Pediatric Ophthalmology',subtitle:'Garden Village',locked:true,topics:[]},{id:'plastics',name:'Oculoplastics',subtitle:'Royal Palace',locked:true,topics:[]},{id:'optics',name:'Optics & Refraction',subtitle:'The Observatory',locked:true,topics:[]}];
const TIER_LABELS={3:'⭐⭐⭐ Must Know',2:'⭐⭐ Good to Know',1:'⭐ Low Yield'};
const TIER_STARS={3:'⭐⭐⭐',2:'⭐⭐',1:'⭐'};
let state={checked:{},topics:{}},editMode=false,currentDistrict=null,editingTopicId=null;
function loadState(){try{const s=localStorage.getItem('ophthoKingdom');if(s)state=JSON.parse(s)}catch(e){}DISTRICTS_DEF.forEach(d=>{if(!state.topics[d.id])state.topics[d.id]=d.topics.map(t=>({...t}))})}
function saveState(){localStorage.setItem('ophthoKingdom',JSON.stringify(state))}
function getTopics(id){return state.topics[id]||[]}
function calcProgress(id){const t=getTopics(id),m=t.filter(x=>x.tier===3);if(!m.length)return 0;return Math.round(m.filter(x=>state.checked[x.id]).length/m.length*100)}
function calcOverall(){const u=DISTRICTS_DEF.filter(d=>!d.locked);if(!u.length)return 0;return Math.round(u.reduce((a,d)=>a+calcProgress(d.id),0)/u.length)}
function getTier(p){return p>=100?100:p>=75?75:p>=50?50:p>=25?25:0}
function getTierLabel(t){return{0:'Barren Wasteland',25:'Humble Settlement',50:'Growing Town',75:'Castle District',100:'Grand Kingdom'}[t]||'Barren'}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function renderScene(id,pct,locked){
  if(locked)return '<div class="fog-overlay"><div class="lock-icon">🔒</div><div class="fog-text">UNDISCOVERED</div></div>';
  const tier=getTier(pct),W=280,H=160;
  const skies={0:['#2a2030','#1a1025'],25:['#3a2820','#251510'],50:['#1e2840','#0d1520'],75:['#1a3050','#0a1828'],100:['#0a2040','#050f20']};
  const gc={0:'#1a0f08',25:'#2d1a0a',50:'#2a2218',75:'#1e2a18',100:'#142010'};
  const sky=skies[tier],gY=110;
  let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">'
    +'<defs><linearGradient id="sk'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+sky[0]+'"/><stop offset="100%" stop-color="'+sky[1]+'"/></linearGradient>'
    +'<radialGradient id="gl'+id+'" cx="50%" cy="100%" r="60%"><stop offset="0%" stop-color="#ffd54f" stop-opacity="0.4"/><stop offset="100%" stop-color="#ffd54f" stop-opacity="0"/></radialGradient>'
    +'<filter id="bl'+id+'"><feGaussianBlur stdDeviation="3"/></filter></defs>'
    +'<rect width="'+W+'" height="'+H+'" fill="url(#sk'+id+')"/>'
    +'<rect x="0" y="'+gY+'" width="'+W+'" height="'+(H-gY)+'" fill="'+gc[tier]+'"/>';
  if(tier===0){s+='<line x1="30" y1="'+gY+'" x2="30" y2="75" stroke="#3a2510" stroke-width="3"/>'
    +'<line x1="30" y1="85" x2="20" y2="75" stroke="#3a2510" stroke-width="2"/>'
    +'<line x1="220" y1="'+gY+'" x2="220" y2="80" stroke="#3a2510" stroke-width="2.5"/>'
    +'<ellipse cx="120" cy="'+(gY+5)+'" rx="18" ry="8" fill="#2a1f15"/>'
    +'<ellipse cx="170" cy="'+(gY+6)+'" rx="12" ry="6" fill="#251a10"/>'
    +'<rect class="fog-layer" x="-20" y="85" width="320" height="30" rx="15" fill="rgba(180,190,200,0.12)"/>'
    +'<rect class="fog-layer2" x="-30" y="95" width="340" height="20" rx="10" fill="rgba(160,175,190,0.1)"/>';}
  else if(tier===25){s+='<path d="M0,'+(gY+5)+' Q140,'+(gY+2)+' 280,'+(gY+5)+'" stroke="#5c3a1a" stroke-width="8" fill="none" opacity="0.7"/>'
    +'<rect x="60" y="85" width="40" height="25" fill="#5c3a1a"/><polygon points="55,85 100,85 77,65" fill="#7a4a20"/><rect x="73" y="97" width="9" height="13" fill="#3a2010"/>'
    +'<rect x="170" y="88" width="32" height="22" fill="#4a2e12"/><polygon points="165,88 207,88 186,70" fill="#6a3a18"/><rect x="182" y="99" width="8" height="11" fill="#2a1808"/>'
    +'<line x1="110" y1="'+gY+'" x2="110" y2="95" stroke="#6a4a20" stroke-width="2"/><line x1="120" y1="'+gY+'" x2="120" y2="95" stroke="#6a4a20" stroke-width="2"/><line x1="130" y1="'+gY+'" x2="130" y2="95" stroke="#6a4a20" stroke-width="2"/>'
    +'<line x1="108" y1="98" x2="132" y2="98" stroke="#6a4a20" stroke-width="2"/><line x1="108" y1="92" x2="132" y2="92" stroke="#6a4a20" stroke-width="2"/>'
    +'<line x1="240" y1="'+gY+'" x2="240" y2="82" stroke="#4a2e12" stroke-width="2.5"/><circle cx="240" cy="75" r="12" fill="#2a4a1a" opacity="0.9"/>';}
  else if(tier===50){s+='<path d="M0,'+(gY+5)+' Q140,'+(gY+1)+' 280,'+(gY+5)+'" stroke="#6a6060" stroke-width="10" fill="none" opacity="0.6"/>'
    +'<rect x="80" y="72" width="60" height="38" fill="#6a6a6a"/><rect x="83" y="75" width="14" height="14" fill="#4a4444"/><rect x="103" y="75" width="14" height="14" fill="#4a4444"/>'
    +'<rect x="78" y="67" width="10" height="8" fill="#7a7a7a"/><rect x="92" y="67" width="10" height="8" fill="#7a7a7a"/><rect x="106" y="67" width="10" height="8" fill="#7a7a7a"/><rect x="120" y="67" width="10" height="8" fill="#7a7a7a"/>'
    +'<rect x="30" y="85" width="50" height="25" fill="#5a5a5a"/><rect x="190" y="82" width="55" height="28" fill="#5a5a5a"/>'
    +'<rect x="103" y="92" width="12" height="18" fill="#2a2020" rx="6 6 0 0"/>'
    +'<rect x="100" y="87" width="3" height="8" fill="#8b6914"/><ellipse class="torch-flame" cx="101.5" cy="86" rx="3" ry="4" fill="#ffa500" opacity="0.9"/>'
    +'<rect x="118" y="87" width="3" height="8" fill="#8b6914"/><ellipse class="torch-flame" cx="119.5" cy="86" rx="3" ry="4" fill="#ffa500" opacity="0.9"/>';}
  else if(tier===75){s+='<rect x="25" y="60" width="35" height="50" fill="#7a7a7a"/><rect x="22" y="55" width="10" height="8" fill="#8a8a8a"/><rect x="34" y="55" width="10" height="8" fill="#8a8a8a"/><rect x="46" y="55" width="10" height="8" fill="#8a8a8a"/>'
    +'<rect x="218" y="55" width="38" height="55" fill="#7a7a7a"/><rect x="215" y="50" width="10" height="8" fill="#8a8a8a"/><rect x="228" y="50" width="10" height="8" fill="#8a8a8a"/><rect x="241" y="50" width="10" height="8" fill="#8a8a8a"/>'
    +'<rect x="60" y="70" width="160" height="40" fill="#6a6a6a"/>'
    +'<rect x="105" y="45" width="70" height="65" fill="#8a8080"/>'
    +'<rect x="127" y="80" width="26" height="30" fill="#1a1010" rx="13 13 0 0"/>'
    +'<rect x="115" y="55" width="9" height="12" fill="#2a3a5a" rx="4 4 0 0"/><rect x="131" y="52" width="9" height="14" fill="#2a3a5a" rx="4 4 0 0"/><rect x="147" y="55" width="9" height="12" fill="#2a3a5a" rx="4 4 0 0"/>'
    +'<line x1="42" y1="22" x2="42" y2="55" stroke="#5a4030" stroke-width="2"/><polygon class="flag" points="42,22 65,30 42,38" fill="#cc3333"/>'
    +'<line x1="234" y1="18" x2="234" y2="50" stroke="#5a4030" stroke-width="2"/><polygon class="flag" points="234,18 257,26 234,34" fill="#cc3333"/>'
    +'<line x1="140" y1="5" x2="140" y2="38" stroke="#5a4030" stroke-width="2.5"/><polygon class="flag" points="140,5 168,15 140,25" fill="#bb2222"/>'
    +'<rect x="94" y="76" width="3" height="9" fill="#8b6914"/><ellipse class="torch-flame" cx="95.5" cy="74" rx="3.5" ry="5" fill="#ffaa00" opacity="0.9"/>'
    +'<rect x="184" y="76" width="3" height="9" fill="#8b6914"/><ellipse class="torch-flame" cx="185.5" cy="74" rx="3.5" ry="5" fill="#ffaa00" opacity="0.9"/>';}
  else{s+='<ellipse class="glow-aura" cx="140" cy="'+gY+'" rx="120" ry="50" fill="url(#gl'+id+')"/>'
    +'<circle cx="50" cy="20" r="2" fill="#ffd54f" opacity="0.9"/><circle cx="180" cy="15" r="2" fill="#ffd54f" opacity="0.9"/><circle cx="100" cy="10" r="1.5" fill="#fff" opacity="0.8"/>'
    +'<rect x="15" y="45" width="40" height="65" fill="#9a9090"/><polygon points="15,45 55,45 35,20" fill="#aa7722"/>'
    +'<rect x="225" y="40" width="42" height="70" fill="#9a9090"/><polygon points="225,40 267,40 246,14" fill="#aa7722"/>'
    +'<rect x="55" y="65" width="170" height="45" fill="#8a8080"/>'
    +'<rect x="100" y="30" width="80" height="80" fill="#9a9090"/><polygon points="100,30 180,30 140,5" fill="#c9a227"/>'
    +'<rect x="112" y="45" width="12" height="16" fill="#4fc3f7" rx="6 6 0 0" opacity="0.9"/><rect x="130" y="42" width="14" height="18" fill="#4fc3f7" rx="7 7 0 0" opacity="0.9"/><rect x="150" y="45" width="12" height="16" fill="#4fc3f7" rx="6 6 0 0" opacity="0.9"/>'
    +'<rect x="126" y="75" width="28" height="35" fill="#0a0808" rx="14 14 0 0"/>'
    +'<line x1="35" y1="-8" x2="35" y2="45" stroke="#6a5020" stroke-width="2.5"/><polygon class="flag" points="35,-8 65,4 35,16" fill="#c9a227"/>'
    +'<line x1="140" y1="-15" x2="140" y2="5" stroke="#6a5020" stroke-width="3"/><polygon class="flag" points="140,-15 175,-2 140,11" fill="#ffd54f"/>'
    +'<rect x="95" y="68" width="4" height="12" fill="#8b6914"/><ellipse class="torch-flame" cx="97" cy="65" rx="5" ry="7" fill="#ffd54f" opacity="1"/>'
    +'<rect x="183" y="68" width="4" height="12" fill="#8b6914"/><ellipse class="torch-flame" cx="185" cy="65" rx="5" ry="7" fill="#ffd54f" opacity="1"/>'
    +'<ellipse class="glow-aura" cx="140" cy="'+(gY+5)+'" rx="80" ry="12" fill="#c9a227" opacity="0.08"/>';}
  return s+'</svg>';
}
function renderMap(){
  const map=document.getElementById('kingdom-map');
  const overall=calcOverall();
  document.getElementById('overall-pct').textContent=overall+'%';
  document.getElementById('overall-bar').style.width=overall+'%';
  map.innerHTML=DISTRICTS_DEF.map(d=>{
    if(d.locked)return '<div class="district-card locked"><div class="district-visual">'+renderScene(d.id,0,true)+'</div><div class="district-info"><div class="district-name">'+d.name+'</div><div class="district-subtitle">'+d.subtitle+'</div><div class="district-progress-row"><div class="district-tier-badge tier-0">Undiscovered</div></div></div></div>';
    const pct=calcProgress(d.id),tier=getTier(pct),topics=getTopics(d.id),must=topics.filter(t=>t.tier===3),mustDone=must.filter(t=>state.checked[t.id]).length;
    return '<div class="district-card unlocked" data-tier="'+tier+'" onclick="openPanel(\''+d.id+'\')">'+'<div class="district-visual district-scene">'+renderScene(d.id,pct,false)+'</div><div class="district-info"><div class="district-name">'+d.name+'</div><div class="district-subtitle">'+d.subtitle+'</div><div class="district-progress-row"><div class="district-progress-bar"><div class="district-progress-fill" style="width:'+pct+'%"></div></div><div class="district-progress-pct">'+pct+'%</div></div><div style="margin-top:.3rem"><span class="district-tier-badge tier-'+tier+'">'+getTierLabel(tier)+'</span><span style="font-size:.75rem;color:var(--dark-parchment);opacity:.6;margin-left:.5rem">'+mustDone+'/'+must.length+' must-know</span></div></div></div>';
  }).join('');
}
function openPanel(id){const d=DISTRICTS_DEF.find(x=>x.id===id);if(!d||d.locked)return;currentDistrict=id;editingTopicId=null;document.getElementById('panel-title').textContent=d.name+' — '+d.subtitle;renderPanel();document.getElementById('panel-overlay').classList.add('open')}
function closePanel(){document.getElementById('panel-overlay').classList.remove('open');currentDistrict=null;editingTopicId=null}
function closePanelOnOverlay(e){if(e.target===document.getElementById('panel-overlay'))closePanel()}
function renderPanel(){
  if(!currentDistrict)return;
  const topics=getTopics(currentDistrict),pct=calcProgress(currentDistrict),body=document.getElementById('panel-body'),isEdit=editMode;
  let html='<div class="'+(isEdit?'edit-mode':'')+'"><div style="margin-bottom:1rem"><div style="font-family:\'Cinzel\',serif;font-size:.75rem;color:var(--gold);margin-bottom:.3rem;letter-spacing:.08em">DISTRICT PROGRESS: '+pct+'% — '+getTierLabel(getTier(pct))+'</div><div class="progress-bar-outer"><div class="progress-bar-inner" style="width:'+pct+'%"></div></div></div>';
  [3,2,1].forEach(tier=>{
    const tt=topics.filter(t=>t.tier===tier);if(!tt.length)return;
    const done=tt.filter(t=>state.checked[t.id]).length;
    html+='<div class="tier-section"><div class="tier-section-header">'+TIER_LABELS[tier]+'<span class="tier-count">'+done+'/'+tt.length+'</span></div>';
    tt.forEach(topic=>{
      if(editingTopicId===topic.id){
        html+='<div class="topic-edit-form"><input type="text" id="ei-'+topic.id+'" value="'+escHtml(topic.label)+'" style="flex:1" onkeydown="handleEditKey(event,\''+topic.id+'\')" /><select id="et-'+topic.id+'"><option value="3"'+(topic.tier===3?' selected':'')+'>⭐⭐⭐ Must</option><option value="2"'+(topic.tier===2?' selected':'')+'>⭐⭐ Good</option><option value="1"'+(topic.tier===1?' selected':'')+'>⭐ Low</option></select><button class="btn" style="padding:.3rem .7rem;font-size:.75rem" onclick="saveTopicEdit(\''+topic.id+'\')" >Save</button><button class="btn btn-danger" style="padding:.3rem .7rem;font-size:.75rem" onclick="cancelTopicEdit()">Cancel</button></div>';
      }else{
        const checked=!!state.checked[topic.id];
        html+='<div class="topic-item'+(checked?' checked':'')+'" onclick="'+(isEdit?'':'toggleTopic(\''+topic.id+'\')') +'">'+'<div class="topic-checkbox">'+(checked?'✓':'')+'</div><div class="topic-label">'+escHtml(topic.label)+'</div><div class="topic-stars">'+TIER_STARS[topic.tier]+'</div><div class="topic-edit-controls"><button class="topic-edit-btn" onclick="event.stopPropagation();startEditTopic(\''+topic.id+'\')" title="Edit">✎</button><button class="topic-edit-btn del" onclick="event.stopPropagation();deleteTopic(\''+topic.id+'\')" title="Delete">✕</button></div></div>';
      }
    });
    html+='</div>';
  });
  html+='<div class="add-topic-section"><h4>+ Add New Topic</h4><div class="add-topic-form"><input type="text" id="new-topic-input" placeholder="Topic name…" onkeydown="if(event.key===\'Enter\')addTopic()" /><select id="new-topic-tier"><option value="3">⭐⭐⭐ Must Know</option><option value="2">⭐⭐ Good to Know</option><option value="1">⭐ Low Yield</option></select><button class="btn" onclick="addTopic()">Add</button></div></div></div>';
  body.innerHTML=html;
}
function toggleTopic(id){if(editMode)return;state.checked[id]=!state.checked[id];saveState();renderPanel();renderMap();if(state.checked[id]&&currentDistrict){const pct=calcProgress(currentDistrict),tier=getTier(pct);if([25,50,75,100].includes(tier)&&getTier(pct-1)<tier)showNotification('🏰 '+getTierLabel(tier)+' reached!');}}
function startEditTopic(id){editingTopicId=id;renderPanel();setTimeout(()=>{const el=document.getElementById('ei-'+id);if(el){el.focus();el.select()}},50)}
function handleEditKey(e,id){if(e.key==='Enter')saveTopicEdit(id);if(e.key==='Escape')cancelTopicEdit()}
function saveTopicEdit(id){const inp=document.getElementById('ei-'+id),ts=document.getElementById('et-'+id);if(!inp)return;const nl=inp.value.trim();if(!nl)return;const t=state.topics[currentDistrict].find(x=>x.id===id);if(t){t.label=nl;t.tier=parseInt(ts.value)}editingTopicId=null;saveState();renderPanel();renderMap()}
function cancelTopicEdit(){editingTopicId=null;renderPanel()}
function deleteTopic(id){if(!confirm('Remove this topic?'))return;state.topics[currentDistrict]=state.topics[currentDistrict].filter(t=>t.id!==id);delete state.checked[id];saveState();renderPanel();renderMap()}
function addTopic(){const inp=document.getElementById('new-topic-input'),ts=document.getElementById('new-topic-tier'),label=inp.value.trim();if(!label)return;state.topics[currentDistrict].push({id:currentDistrict+'_'+Date.now(),label,tier:parseInt(ts.value)});saveState();inp.value='';renderPanel();renderMap();showNotification('Topic added!')}
function toggleEditMode(){editMode=!editMode;const btn=document.getElementById('edit-mode-btn');btn.textContent=editMode?'✎ Exit Edit Mode':'✎ Edit Mode';btn.classList.toggle('active',editMode);if(currentDistrict)renderPanel()}
function confirmReset(){if(!confirm('Reset ALL progress? This cannot be undone.'))return;state.checked={};saveState();renderMap();if(currentDistrict)renderPanel();showNotification('Kingdom reset. Begin anew, scholar.')}
let notifTimer=null;
function showNotification(msg){const el=document.getElementById('notification');el.textContent=msg;el.classList.add('show');clearTimeout(notifTimer);notifTimer=setTimeout(()=>el.classList.remove('show'),3000)}
loadState();renderMap();
</script>
</body>
</html>
